name: url-shortener

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-replica-1:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--replicaof", "redis", "6379"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./url-shortener-api
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: development
      PORT: "3001"
      MONGODB_URI: mongodb://mongo:27017/url_shortener_development
      REDIS_URL: redis://redis:6379/0
      REDIS_REPLICA_URL: redis://redis-replica-1:6379/0
      CORS_ORIGINS: http://localhost:3000
      SECRET_KEY_BASE: dev_secret_key_base_change_me
    volumes:
      - ./url-shortener-api:/app
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy

  frontend:
    build:
      context: ./url-shortener-client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Browser-side calls hit the backend via its published host port.
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Enable file-watching/HMR through Docker Desktop bind mounts on macOS.
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
    volumes:
      - ./url-shortener-client:/app
      # Named volumes shadow the host's darwin-built node_modules/.next so the
      # linux container uses its own (correct-arch) copies instead.
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
